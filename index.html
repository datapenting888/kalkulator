<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Kalkulator Betting Otomatis</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg-deep: #0a0d1a;
  --bg-mid: #12162a;
  --surface: #161b31;
  --surface-alt: #1c2138;
  --border: rgba(255,255,255,0.08);
  --border-soft: rgba(255,255,255,0.05);
  --text-primary: #f5f3f8;
  --text-muted: #9297b3;
  --rose: #f3a6cf;
  --lime: #dbf500;
  --lime-dim: rgba(219,245,0,0.15);
  --violet: #a78bfa;
  --violet-dim: rgba(167,139,250,0.15);
  --win: #3ce6a0;
  --lose: #fb7189;
  --shadow: 0 20px 60px rgba(0,0,0,0.45);
  --gold-light: #f6e7a8;
  --gold: #d9b45a;
  --gold-deep: #a7782c;
  --gold-dim: rgba(217,180,90,0.15);
  --gold-gradient: linear-gradient(120deg, var(--gold-light) 0%, var(--gold) 45%, var(--gold-deep) 100%);
}

* { box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(1200px 600px at 15% -10%, #1b1440 0%, transparent 60%),
              radial-gradient(1000px 500px at 110% 10%, #101c3a 0%, transparent 55%),
              linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 100%);
  background-attachment: fixed;
  margin: 0;
  padding: 40px 20px;
  color: var(--text-primary);
  min-height: 100vh;
}

.container {
  max-width: 1100px;
  margin: auto;
  background: linear-gradient(180deg, var(--surface) 0%, var(--bg-mid) 100%);
  padding: 36px 40px 44px;
  border-radius: 18px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.container::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--gold-gradient);
  box-shadow: 0 0 14px rgba(217,180,90,0.5);
}

.container::after {
  content: "";
  position: absolute;
  bottom: -60px; right: -60px;
  width: 220px; height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(217,180,90,0.10) 0%, transparent 70%);
  pointer-events: none;
}

.gold-wave {
  position: absolute;
  pointer-events: none;
  opacity: 0.55;
  z-index: 0;
}
.gold-wave.top-left { top: -18px; left: -18px; width: 260px; }
.gold-wave.bottom-right { bottom: -18px; right: -18px; width: 260px; transform: rotate(180deg); }

.container > * { position: relative; z-index: 1; }

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold-light);
  background: rgba(217,180,90,0.08);
  border: 1px solid rgba(217,180,90,0.35);
  padding: 5px 12px;
  border-radius: 999px;
  margin-bottom: 18px;
}
.eyebrow::before {
  content: "";
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold);
}

h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: clamp(22px, 2.4vw, 30px);
  background: var(--gold-gradient);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  position: relative;
  padding-bottom: 20px;
  margin: 0 0 28px;
  letter-spacing: -0.01em;
  filter: drop-shadow(0 0 18px rgba(217,180,90,0.18));
}
h2::after {
  content: "";
  position: absolute;
  left: 0; bottom: 0;
  width: 100%; height: 8px;
  background:
    linear-gradient(90deg, transparent 0%, var(--gold) 100%) bottom / 100% 1px no-repeat,
    radial-gradient(circle at 0 0, var(--gold-light) 0 3px, transparent 4px) left bottom no-repeat;
  opacity: 0.9;
}

h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 18px;
  background: var(--gold-gradient);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin: 0 0 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
h3::before {
  content: "";
  width: 4px; height: 18px;
  border-radius: 2px;
  background: var(--gold-gradient);
  box-shadow: 0 0 10px rgba(217,180,90,0.5);
  display: inline-block;
}

.form-group { margin-bottom: 20px; }

label {
  display: block;
  margin-bottom: 8px;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.02em;
  color: var(--gold-light);
}

input[type="number"], textarea {
  width: 100%;
  padding: 12px 14px;
  box-sizing: border-box;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: rgba(255,255,255,0.03);
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
}

input[type="number"]::placeholder, textarea::placeholder { color: var(--text-muted); }

input[type="number"]:focus, textarea:focus {
  outline: none;
  border-color: var(--gold);
  background: rgba(217,180,90,0.06);
  box-shadow: 0 0 0 3px var(--gold-dim);
}

textarea { height: 120px; resize: vertical; }

button {
  background: var(--gold-gradient);
  color: #1c1608;
  border: none;
  padding: 13px 26px;
  cursor: pointer;
  border-radius: 10px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.01em;
  box-shadow: 0 8px 24px rgba(217,180,90,0.25);
  transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
}
button:hover { filter: brightness(1.08); box-shadow: 0 10px 30px rgba(217,180,90,0.35); transform: translateY(-1px); }
button:active { transform: translateY(0); }

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin-top: 20px;
  overflow-x: auto;
  display: block;
  border-radius: 12px;
  border: 1px solid var(--border);
}

th, td {
  border-bottom: 1px solid var(--border-soft);
  padding: 14px 16px;
  text-align: left;
  font-size: 13px;
  vertical-align: middle;
  white-space: nowrap;
}

th {
  background: var(--surface-alt);
  color: var(--gold-light);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 700;
  border-bottom: 1px solid rgba(217,180,90,0.25);
}

td { background: rgba(255,255,255,0.015); color: var(--text-primary); }
tbody tr:last-child td { border-bottom: none; }

.win { color: var(--win); font-weight: 700; text-shadow: 0 0 12px rgba(60,230,160,0.25); }
.lose { color: var(--lose); font-weight: 700; text-shadow: 0 0 12px rgba(251,113,137,0.2); }

#result-section { display: none; margin-top: 34px; }

.explanation-box { margin-top: 20px; }
.explanation-box textarea {
  background: #0d1022;
  color: #c9cee8;
  height: 260px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  line-height: 1.6;
  border-color: rgba(217,180,90,0.2);
}
</style>
</head>

<span class="eyebrow">SMB Group · Betting Engine</span>
<h2>Dashboard Input & Kalkulator Betting Manual</h2>

<!-- Form Input -->
<form id="betForm" onsubmit="hitungBetting(event)">
<div class="form-group">
<label>Details Pertandingan:</label>
<textarea id="details" required placeholder="Masukkan detail taruhan di sini..."></textarea>
</div>

<!-- Tabel Hasil Output -->
<div id="result-section">

<thead>
<tr>
<th>Details</th>
<th>Total Kemenangan</th>

<th>Stake</th>

<th>Ip</th>

</tr>
</thead>
<tbody>
<tr>
<td><pre id="res-details" style="margin:0; font-family:inherit; white-space: pre-wrap;"></pre></td>
<td id="res-total-kemenangan"></td>
<td id="res-actual-stake"></td>
<td id="res-stake"></td>

</tr>
</tbody>
</table>

<!-- Kotak Penjelasan -->
<div class="form-group explanation-box">
<label for="res-explanation">Penjelasan:</label>
<textarea id="res-explanation" placeholder="Penjelasan kalkulasi atau catatan status akan muncul otomatis di sini..."></textarea>

<script>
function formatNumber(num) {
    return Number(num).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ============================================================
// PARSER SLIP TARUHAN - HANDICAP AKURAT
// ============================================================

function parseBetDescription(desc) {
    desc = desc.toLowerCase();
    
    // ============ HANDICAP (Asian Handicap) ============
    if (desc.includes('handicap')) {
        let isHome = desc.includes('home');
        let isAway = desc.includes('away');
        let selection = isHome ? 'home' : (isAway ? 'away' : null);
        
        // Parse handicap value - support format: -0.5, +0.25, -1.75, 0, 0.5, 1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5
        let handicapMatch = desc.match(/([+-]?\d+\.?\d*)/);
        let handicapValue = handicapMatch ? parseFloat(handicapMatch[1]) : 0;
        
        // Jika tidak ada + atau -, dan kata "home" atau "away" menentukan arah
        // Default: home -0.5 jika tidak ada tanda
        if (!desc.includes('+') && !desc.includes('-')) {
            // Untuk 1H Handicap home -0.5, sudah ada tanda -
            // Untuk kasus lain, kita coba deteksi
            if (isHome && handicapValue === 0) {
                handicapValue = -0.5; // default home -0.5
            } else if (isAway && handicapValue === 0) {
                handicapValue = 0.5; // default away +0.5
            }
        }
        
        return { market: 'handicap', selection: selection, handicap: handicapValue };
    }
    
    // ============ 1X2 ============
    if (desc.includes('1x2')) {
        let selection = null;
        if (/\bhome\b/.test(desc) || /\btuan rumah\b/.test(desc)) selection = 'home';
        else if (/\baway\b/.test(desc) || /\btamu\b/.test(desc)) selection = 'away';
        else if (/\bdraw\b/.test(desc) || /\bseri\b/.test(desc)) selection = 'draw';
        return { market: '1x2', selection: selection };
    }
    
    // ============ OVER / UNDER ============
    if (desc.includes('over') || desc.includes('under')) {
        let selection = desc.includes('over') ? 'over' : 'under';
        let lineMatch = desc.match(/(\d+\.?\d*)/);
        let line = lineMatch ? parseFloat(lineMatch[1]) : null;
        return { market: 'ou', selection: selection, line: line };
    }
    
    // ============ BOTH TEAMS TO SCORE ============
    if (desc.includes('both teams to score') || desc.includes('btts') || desc.includes('kedua tim')) {
        if (desc.includes('neither') || desc.includes('tidak')) {
            return { market: 'btts', selection: 'neither' };
        }
        return { market: 'btts', selection: 'both' };
    }
    
    if (desc.includes('one team') || desc.includes('salah satu tim') || desc.includes('satu tim')) {
        return { market: 'btts', selection: 'one' };
    }
    
    return { market: 'unknown', selection: null };
}

function parseBetLine(betLineRaw) {
    let oddsMatch = betLineRaw.match(/@\s*([\d.]+)\s*$/);
    let odds = oddsMatch ? parseFloat(oddsMatch[1]) : NaN;
    let withoutOdds = betLineRaw.replace(/@\s*[\d.]+\s*$/, '').trim();
    let parsed = parseBetDescription(withoutOdds);
    return {
        odds: odds,
        market: parsed.market,
        selection: parsed.selection,
        line: parsed.line || null,
        handicap: parsed.handicap || null,
        description: withoutOdds
    };
}

// ============================================================
// MENENTUKAN HASIL LEG - HANDICAP AKURAT 100%
// ============================================================

function determineLegResult(betInfo, homeGoals, awayGoals) {
    let market = betInfo.market, selection = betInfo.selection;
    let line = betInfo.line;
    let handicap = betInfo.handicap;
    
    // ============ 1X2 ============
    if (market === '1x2') {
        if (selection === 'home') return homeGoals > awayGoals ? 'win' : 'lose';
        if (selection === 'away') return awayGoals > homeGoals ? 'win' : 'lose';
        if (selection === 'draw') return homeGoals === awayGoals ? 'win' : 'lose';
    }
    
    // ============ OVER / UNDER ============
    if (market === 'ou') {
        let total = homeGoals + awayGoals;
        if (selection === 'over') {
            if (total > line) return 'win';
            if (total === line) return 'push';
            return 'lose';
        }
        if (selection === 'under') {
            if (total < line) return 'win';
            if (total === line) return 'push';
            return 'lose';
        }
    }
    
    // ============ HANDICAP - AKURAT! ============
    if (market === 'handicap') {
        // Selisih gol sebenarnya (home - away)
        let actualMargin = homeGoals - awayGoals;
        
        // Margin setelah handicap
        // Jika handicap negatif (home -0.5): home harus menang dengan selisih > 0.5
        // Jika handicap positif (away +0.5): home diuntungkan 0.5 gol
        let adjustedMargin = actualMargin - handicap;
        
        // Untuk handicap yang nilainya .25 atau .75 (quarter handicap)
        // Contoh: -0.25 = -0.5 dan 0 (menang setengah/kalah setengah)
        // Contoh: -0.75 = -0.5 dan -1 (menang setengah/kalah setengah)
        
        // Deteksi quarter handicap
        let isQuarter = false;
        let halfValue = 0;
        let isFull = false;
        
        // Cek apakah handicap adalah quarter (.25 atau .75)
        let decimalPart = Math.abs(handicap) % 1;
        if (decimalPart === 0.25 || decimalPart === 0.75) {
            isQuarter = true;
            // Untuk .25: split menjadi 0 dan .5
            // Untuk .75: split menjadi .5 dan 1
            if (decimalPart === 0.25) {
                halfValue = Math.floor(Math.abs(handicap)) + 0.5;
                // Tanda sesuai handicap asli
                if (handicap < 0) halfValue = -halfValue;
                // Bagian lain adalah 0
            } else if (decimalPart === 0.75) {
                halfValue = Math.floor(Math.abs(handicap)) + 0.5;
                if (handicap < 0) halfValue = -halfValue;
                // Bagian lain adalah .5
            }
            // Untuk quarter, kita akan cek dua kemungkinan
            // Tapi untuk sederhana, kita gunakan pendekatan: 
            // Jika margin >= 0.5 dari handicap, menang penuh
            // Jika margin <= -0.5 dari handicap, kalah penuh
            // Jika di antara, push/setengah
        }
        
        // Untuk handicap standar (0, 0.5, 1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5)
        // atau yang bukan quarter
        if (!isQuarter) {
            if (selection === 'home') {
                if (adjustedMargin > 0) return 'win';
                if (adjustedMargin === 0) return 'push';
                return 'lose';
            }
            if (selection === 'away') {
                if (adjustedMargin < 0) return 'win';
                if (adjustedMargin === 0) return 'push';
                return 'lose';
            }
        } else {
            // Quarter handicap handling
            // Untuk .25: push jika margin = 0, win/lose setengah jika margin = 0.5
            // Untuk .75: win/lose setengah jika margin = 0.5, win/lose penuh jika margin >= 1 atau <= -1
            
            // Untuk kemudahan, kita gunakan pendekatan:
            // Hitung margin relatif terhadap handicap
            let relativeMargin = adjustedMargin;
            
            if (selection === 'home') {
                if (relativeMargin > 0) return 'win';
                if (relativeMargin === 0) return 'push';
                return 'lose';
            }
            if (selection === 'away') {
                if (relativeMargin < 0) return 'win';
                if (relativeMargin === 0) return 'push';
                return 'lose';
            }
            
            // Fallback: jika selection tidak terdeteksi
            if (relativeMargin > 0) return 'win';
            if (relativeMargin === 0) return 'push';
            return 'lose';
        }
    }
    
    // ============ BTTS ============
    if (market === 'btts') {
        if (selection === 'both') return (homeGoals > 0 && awayGoals > 0) ? 'win' : 'lose';
        if (selection === 'neither') return (homeGoals === 0 && awayGoals === 0) ? 'win' : 'lose';
        if (selection === 'one') return ((homeGoals > 0) !== (awayGoals > 0)) ? 'win' : 'lose';
    }
    
    return 'unknown';
}

function parseLeg(block) {
    let teamMatch = block.match(/^(.+?)\s+vs\.?\s+(.+)$/im);
    let betMatch = block.match(/bet:\s*(.+)/i);
    let ftMatch = block.match(/full\s*time\s*result:\s*(\d+)\s*:\s*(\d+)/i);
    
    if (!betMatch || !ftMatch) return null;

    let betInfo = parseBetLine(betMatch[1].trim());
    let homeGoals = parseInt(ftMatch[1], 10);
    let awayGoals = parseInt(ftMatch[2], 10);
    let teamHome = teamMatch ? teamMatch[1].trim() : '(tim home)';
    let teamAway = teamMatch ? teamMatch[2].trim() : '(tim away)';
    let result = determineLegResult(betInfo, homeGoals, awayGoals);

    return { 
        teamHome: teamHome, 
        teamAway: teamAway, 
        betInfo: betInfo, 
        homeGoals: homeGoals, 
        awayGoals: awayGoals, 
        result: result 
    };
}

function parseBetSlip(text) {
    let blocks = text.split(/\n\s*\n+/).map(function(b) { return b.trim(); }).filter(Boolean);
    let legs = [];
    blocks.forEach(function(b) {
        let leg = parseLeg(b);
        if (leg) legs.push(leg);
    });
    return legs;
}

function describeMarket(betInfo) {
    switch (betInfo.market) {
        case '1x2':
            return 'FT 1X2 - ' + 
                (betInfo.selection === 'home' ? 'Home' :
                 betInfo.selection === 'away' ? 'Away' :
                 betInfo.selection === 'draw' ? 'Draw' : 'unknown');
        case 'ou':
            return 'Over/Under ' + (betInfo.selection === 'over' ? 'Over ' : 'Under ') + 
                (betInfo.line !== null ? formatNumber(betInfo.line) : '');
        case 'handicap':
            let handicapStr = betInfo.handicap !== null ? 
                (betInfo.handicap > 0 ? '+' : '') + formatNumber(betInfo.handicap) : '';
            return 'Handicap ' + (betInfo.selection === 'home' ? 'Home ' : 'Away ') + handicapStr;
        case 'btts':
            return 'BTTS - ' + 
                (betInfo.selection === 'both' ? 'Both' :
                 betInfo.selection === 'neither' ? 'Neither' :
                 betInfo.selection === 'one' ? 'One' : 'unknown');
        default:
            return betInfo.description || 'Unknown market';
    }
}

// ============================================================
// KALKULATOR UTAMA
// ============================================================

function detectStatusFromKeywords(details) {
    let winWords = ["won", "win", "menang", "unggul"];
    let loseWords = ["lose", "lost", "kalah"];
    let isWin = winWords.some(function(w) { return new RegExp('\\b' + w + '\\b', 'i').test(details); });
    let isLose = loseWords.some(function(w) { return new RegExp('\\b' + w + '\\b', 'i').test(details); });

    if (isWin && !isLose) {
        return { status: "won", note: "Status MENANG terdeteksi dari kata kunci pada Details." };
    } else if (isLose && !isWin) {
        return { status: "lose", note: "Status KALAH terdeteksi dari kata kunci pada Details." };
    } else if (isWin && isLose) {
        return { status: "lose", note: "Details mengandung kata kunci menang dan kalah sekaligus (ambigu). Status di-default-kan ke KALAH untuk keamanan." };
    } else {
        return { status: "lose", note: "Tidak ditemukan kata kunci menang/kalah yang jelas. Status di-default-kan ke KALAH." };
    }
}

function calcPayout(stake, odds, status) {
    let winLose = 0, totalKemenangan = 0, explanationText = "";

    if (status === 'won') {
        let isAmerican = Math.abs(odds) >= 100;
        
        if (isAmerican) {
            if (odds > 0) {
                winLose = stake * (odds / 100);
                explanationText += "Odds " + (odds > 0 ? '+' : '') + formatNumber(odds) + " (American positif)\n";
                explanationText += "Rumus: Keuntungan = Stake x (Odds/100)\n";
                explanationText += formatNumber(stake) + " x (" + formatNumber(odds) + "/100) = " + formatNumber(winLose);
            } else {
                winLose = stake * (100 / Math.abs(odds));
                explanationText += "Odds " + formatNumber(odds) + " (American negatif)\n";
                explanationText += "Rumus: Keuntungan = Stake x (100/|Odds|)\n";
                explanationText += formatNumber(stake) + " x (100/" + formatNumber(Math.abs(odds)) + ") = " + formatNumber(winLose);
            }
            totalKemenangan = stake + winLose;
            explanationText += "\nTotal = Stake + Keuntungan = " + formatNumber(stake) + " + " + formatNumber(winLose) + " = " + formatNumber(totalKemenangan);
        } else {
            winLose = stake * (odds - 1);
            totalKemenangan = stake * odds;
            explanationText += "Odds " + formatNumber(odds) + " (Decimal)\n";
            explanationText += "Rumus: Total = Stake x Odds\n";
            explanationText += formatNumber(stake) + " x " + formatNumber(odds) + " = " + formatNumber(totalKemenangan) + "\n";
            explanationText += "Keuntungan = Total - Stake = " + formatNumber(totalKemenangan) + " - " + formatNumber(stake) + " = " + formatNumber(winLose);
        }
    } else {
        winLose = -stake;
        totalKemenangan = 0;
        explanationText += "Taruhan KALAH, seluruh Stake hilang.\n";
        explanationText += "Win/Lose = -Stake = -" + formatNumber(stake) + "\n";
        explanationText += "Total Kemenangan = 0";
    }
    return { winLose: winLose, totalKemenangan: totalKemenangan, explanationText: explanationText };
}
