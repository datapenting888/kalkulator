<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Kalkulator Betting Otomatis</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg-deep: #0a0d1a;
  --bg-mid: #12162a;
  --surface: #161b31;
  --surface-alt: #1c2138;
  --border: rgba(255,255,255,0.08);
  --border-soft: rgba(255,255,255,0.05);
  --text-primary: #f5f3f8;
  --text-muted: #9297b3;
  --rose: #f3a6cf;
  --lime: #dbf500;
  --lime-dim: rgba(219,245,0,0.15);
  --violet: #a78bfa;
  --violet-dim: rgba(167,139,250,0.15);
  --win: #3ce6a0;
  --lose: #fb7189;
  --shadow: 0 20px 60px rgba(0,0,0,0.45);
  --gold-light: #f6e7a8;
  --gold: #d9b45a;
  --gold-deep: #a7782c;
  --gold-dim: rgba(217,180,90,0.15);
  --gold-gradient: linear-gradient(120deg, var(--gold-light) 0%, var(--gold) 45%, var(--gold-deep) 100%);
}

* { box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(1200px 600px at 15% -10%, #1b1440 0%, transparent 60%),
              radial-gradient(1000px 500px at 110% 10%, #101c3a 0%, transparent 55%),
              linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 100%);
  background-attachment: fixed;
  margin: 0;
  padding: 40px 20px;
  color: var(--text-primary);
  min-height: 100vh;
}

.container {
  max-width: 1100px;
  margin: auto;
  background: linear-gradient(180deg, var(--surface) 0%, var(--bg-mid) 100%);
  padding: 36px 40px 44px;
  border-radius: 18px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.container::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--gold-gradient);
  box-shadow: 0 0 14px rgba(217,180,90,0.5);
}

.container::after {
  content: "";
  position: absolute;
  bottom: -60px; right: -60px;
  width: 220px; height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(217,180,90,0.10) 0%, transparent 70%);
  pointer-events: none;
}

.gold-wave {
  position: absolute;
  pointer-events: none;
  opacity: 0.55;
  z-index: 0;
}
.gold-wave.top-left { top: -18px; left: -18px; width: 260px; }
.gold-wave.bottom-right { bottom: -18px; right: -18px; width: 260px; transform: rotate(180deg); }

.container > * { position: relative; z-index: 1; }

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold-light);
  background: rgba(217,180,90,0.08);
  border: 1px solid rgba(217,180,90,0.35);
  padding: 5px 12px;
  border-radius: 999px;
  margin-bottom: 18px;
}
.eyebrow::before {
  content: "";
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold);
}

h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: clamp(22px, 2.4vw, 30px);
  background: var(--gold-gradient);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  position: relative;
  padding-bottom: 20px;
  margin: 0 0 28px;
  letter-spacing: -0.01em;
  filter: drop-shadow(0 0 18px rgba(217,180,90,0.18));
}
h2::after {
  content: "";
  position: absolute;
  left: 0; bottom: 0;
  width: 100%; height: 8px;
  background:
    linear-gradient(90deg, transparent 0%, var(--gold) 100%) bottom / 100% 1px no-repeat,
    radial-gradient(circle at 0 0, var(--gold-light) 0 3px, transparent 4px) left bottom no-repeat;
  opacity: 0.9;
}

h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 18px;
  background: var(--gold-gradient);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin: 0 0 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
h3::before {
  content: "";
  width: 4px; height: 18px;
  border-radius: 2px;
  background: var(--gold-gradient);
  box-shadow: 0 0 10px rgba(217,180,90,0.5);
  display: inline-block;
}

.form-group { margin-bottom: 20px; }

label {
  display: block;
  margin-bottom: 8px;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.02em;
  color: var(--gold-light);
}

input[type="number"], textarea {
  width: 100%;
  padding: 12px 14px;
  box-sizing: border-box;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: rgba(255,255,255,0.03);
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
}

input[type="number"]::placeholder, textarea::placeholder { color: var(--text-muted); }

input[type="number"]:focus, textarea:focus {
  outline: none;
  border-color: var(--gold);
  background: rgba(217,180,90,0.06);
  box-shadow: 0 0 0 3px var(--gold-dim);
}

textarea { height: 120px; resize: vertical; }

button {
  background: var(--gold-gradient);
  color: #1c1608;
  border: none;
  padding: 13px 26px;
  cursor: pointer;
  border-radius: 10px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.01em;
  box-shadow: 0 8px 24px rgba(217,180,90,0.25);
  transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
}
button:hover { filter: brightness(1.08); box-shadow: 0 10px 30px rgba(217,180,90,0.35); transform: translateY(-1px); }
button:active { transform: translateY(0); }

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin-top: 20px;
  overflow-x: auto;
  display: block;
  border-radius: 12px;
  border: 1px solid var(--border);
}

th, td {
  border-bottom: 1px solid var(--border-soft);
  padding: 14px 16px;
  text-align: left;
  font-size: 13px;
  vertical-align: middle;
  white-space: nowrap;
}

th {
  background: var(--surface-alt);
  color: var(--gold-light);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 700;
  border-bottom: 1px solid rgba(217,180,90,0.25);
}

td { background: rgba(255,255,255,0.015); color: var(--text-primary); }
tbody tr:last-child td { border-bottom: none; }

.win { color: var(--win); font-weight: 700; text-shadow: 0 0 12px rgba(60,230,160,0.25); }
.lose { color: var(--lose); font-weight: 700; text-shadow: 0 0 12px rgba(251,113,137,0.2); }
.neutral { color: var(--gold-light); font-weight: 700; text-shadow: 0 0 12px rgba(217,180,90,0.25); }

#result-section { display: none; margin-top: 34px; }

.explanation-box { margin-top: 20px; }
.explanation-box textarea {
  background: #0d1022;
  color: #c9cee8;
  min-height: 260px;
  height: 260px;
  overflow: hidden;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  line-height: 1.6;
  border-color: rgba(217,180,90,0.2);
}
</style>
</head>

  <defs>

      <stop offset="0" stop-color="#f6e7a8"/>

</svg>
<span class="eyebrow">SMB Group · Betting Engine</span>
<h2>Dashboard Input & Kalkulator Betting Manual</h2>

<!-- Form Input -->
<form id="betForm" onsubmit="hitungBetting(event)">
<div class="form-group">
<label>Details Pertandingan:</label>
<textarea id="details" required placeholder="Masukkan detail taruhan di sini..."></textarea>
</div>

<div class="form-group">
<label>Stake:</label>
<input type="number" step="any" id="stake" required placeholder="Contoh: 100">
</div>

</form>

<!-- Tabel Hasil Output -->
<div id="result-section">
<h3>Hasil Kalkulasi Dashboard:</h3>
<table>
<thead>
<tr>
<th>Details</th>
<th>Total Kemenangan</th>
<th>Actual Stake</th>
<th>Stake</th>
<th>Win & Lose</th>
<th>Odds</th>
<th>Status</th>
</tr>
</thead>
<tbody>
<tr>
<td><pre id="res-details" style="margin:0; font-family:inherit; white-space: pre-wrap;"></pre></td>
<td id="res-total-kemenangan"></td>
<td id="res-actual-stake"></td>
<td id="res-stake"></td>
<td id="res-win-lose"></td>
<td id="res-odds"></td>
<td id="res-status"></td>
</tr>
</tbody>
</table>

<!-- Kotak Penjelasan -->
<div class="form-group explanation-box">
<label for="res-explanation">Penjelasan:</label>
<textarea id="res-explanation" placeholder="Penjelasan kalkulasi atau catatan status akan muncul otomatis di sini..."></textarea>
</div>
</div>

</div>

<script>
function formatNumber(num) {
    return Number(num).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ============================================================
// NORMALISASI TEKS INPUT
// ============================================================
// Slip taruhan sering di-copy-paste dari berbagai sumber yang memakai
// karakter berbeda untuk hal yang sama secara visual: en-dash/em-dash/
// minus-sign unicode alih-alih hyphen biasa, non-breaking space, koma
// sebagai desimal, atau spasi di antara tanda minus dan angkanya.
// Tanpa normalisasi ini, tanda "-" pada handicap (mis. -0.75) bisa
// hilang saat parsing dan mengubah total hasil perhitungan.
// ============================================================
function normalizeBetText(text) {
    if (!text) return text;
    return text
        .replace(/\u00A0/g, ' ')                          // non-breaking space -> spasi biasa
        .replace(/[\u2010\u2011\u2012\u2013\u2014\u2212]/g, '-') // varian dash/minus unicode -> hyphen biasa
        .replace(/([+-])\s+(?=\d)/g, '$1')                // "- 0.75" -> "-0.75"
        .replace(/(\d),(\d)/g, '$1.$2');                  // "0,75" -> "0.75" (format desimal koma)
}

// ============================================================
// AUTO-GROW TEXTAREA: tinggi otomatis menyesuaikan isi konten
// ============================================================
function autoGrowTextarea(el, minHeight) {
    if (!el) return;
    el.style.height = 'auto';
    let newHeight = el.scrollHeight;
    if (minHeight && newHeight < minHeight) newHeight = minHeight;
    el.style.height = newHeight + 'px';
}



// ============================================================
// BAGIAN 1: PARSER SLIP TARUHAN MULTI-LEG (PARLAY / MIX PARLAY)
// ============================================================
// Details Pertandingan bisa berisi satu atau beberapa pertandingan
// yang dipisah baris kosong, masing-masing dengan format seperti:
//
//   Soccer
//   Genoa vs AC Trento
//   ...
//   Bet: Both/One/Neither Team To Score both teams to score 0 @2.63
//   Full time result: 2:1
//
// Fungsi di bawah ini mem-parsing tiap leg, membandingkan pilihan
// taruhan (Bet:) dengan hasil akhir (Full time result), lalu
// menentukan MENANG/KALAH per leg secara otomatis dan akurat —
// bukan menebak dari kata kunci umum seperti versi sebelumnya.

function parseBetDescription(desc) {
    desc = desc.toLowerCase();
    if (/\bhandicap\b/.test(desc) || /\bhdp\b/.test(desc) || /\basian\s*handicap\b/.test(desc)) {
        let teamRef = desc.replace(/asian\s*handicap|handicap|hdp/g, '').trim();
        return { market: 'handicap', selection: teamRef };
    }
    if (desc.includes('1x2')) {
        let selection = null;
        if (/\bhome\b/.test(desc)) selection = 'home';
        else if (/\baway\b/.test(desc)) selection = 'away';
        else if (/\bdraw\b/.test(desc)) selection = 'draw';
        return { market: '1x2', selection: selection };
    }
    if (desc.includes('over') || desc.includes('under')) {
        let selection = desc.includes('over') ? 'over' : 'under';
        return { market: 'ou', selection: selection };
    }
    if (desc.includes('both teams to score') || desc.includes('btts')) {
        return { market: 'btts', selection: 'both' };
    }
    if (desc.includes('neither')) {
        return { market: 'btts', selection: 'neither' };
    }
    if (/\bone team\b/.test(desc)) {
        return { market: 'btts', selection: 'one' };
    }
    return { market: 'unknown', selection: null };
}

function parseBetLine(betLineRaw) {
    let oddsMatch = betLineRaw.match(/@\s*([\d.]+)\s*$/);
    let odds = oddsMatch ? parseFloat(oddsMatch[1]) : NaN;
    let withoutOdds = betLineRaw.replace(/@\s*[\d.]+\s*$/, '').trim();
    // Lepas tanda kurung pembungkus angka garis, mis. "(-0.75)" -> "-0.75"
    withoutOdds = withoutOdds.replace(/\(\s*([+-]?[\d.]+)\s*\)\s*$/, '$1').trim();
    // Perhatikan tanda +/- di depan angka garis (penting untuk Handicap, mis. -0.75)
    let lineMatch = withoutOdds.match(/([+-]?[\d.]+)\s*$/);
    let line = lineMatch ? parseFloat(lineMatch[1]) : null;
    let withoutLine = lineMatch ? withoutOdds.slice(0, lineMatch.index).trim() : withoutOdds;
    let parsed = parseBetDescription(withoutLine);
    return {
        odds: odds,
        line: line,
        market: parsed.market,
        selection: parsed.selection,
        description: withoutLine
    };
}

// ------------------------------------------------------------
// Asian Handicap: mendukung garis penuh (-1, 0), setengah (-0.5)
// maupun quarter (-0.75, -0.25, dst) dengan pemecahan menjadi
// dua sub-garis @ setengah stake masing-masing (standar industri).
// Mengembalikan factor: 1 = menang penuh, 0.5 = menang setengah,
// 0 = push (stake kembali), -0.5 = kalah setengah, -1 = kalah penuh.
// ------------------------------------------------------------
function asianHandicapFactor(line, teamGoals, oppGoals) {
    function evalHalf(l) {
        let diff = (teamGoals - oppGoals) + l;
        if (diff > 0) return 1;
        if (diff === 0) return 0;
        return -1;
    }
    let quarterUnits = Math.round(line * 4);
    let isQuarterLine = quarterUnits % 2 !== 0;
    if (isQuarterLine) {
        let lower = (quarterUnits - 1) / 4;
        let upper = (quarterUnits + 1) / 4;
        return (evalHalf(lower) + evalHalf(upper)) / 2;
    }
    return evalHalf(line);
}

// Sama seperti asianHandicapFactor, tapi juga mengembalikan uraian
// langkah-demi-langkah dalam Bahasa Indonesia untuk ditampilkan di
// kotak Penjelasan (tanpa perlu API AI eksternal).
function asianHandicapReasoning(line, teamGoals, oppGoals, teamLabel, oppLabel) {
    function evalHalf(l) {
        let diff = (teamGoals - oppGoals) + l;
        let hasil = diff > 0 ? 'MENANG' : (diff === 0 ? 'PUSH' : 'KALAH');
        let tanda = l >= 0 ? '+' : '';
        return {
            factor: diff > 0 ? 1 : (diff === 0 ? 0 : -1),
            text: "   Skor (" + teamLabel + " " + teamGoals + " - " + oppGoals + " " + oppLabel + ") " + tanda + formatNumber(l) +
                  " = margin " + formatNumber(diff) + " -> " + hasil
        };
    }
    let quarterUnits = Math.round(line * 4);
    let isQuarterLine = quarterUnits % 2 !== 0;
    let lines = [];
    let factor;
    if (isQuarterLine) {
        let lower = (quarterUnits - 1) / 4;
        let upper = (quarterUnits + 1) / 4;
        let a = evalHalf(lower), b = evalHalf(upper);
        factor = (a.factor + b.factor) / 2;
        lines.push("Handicap " + formatNumber(line) + " adalah garis QUARTER, dipecah jadi 2 sub-taruhan setengah stake:");
        lines.push("  Sub 1 - Handicap " + (lower >= 0 ? '+' : '') + formatNumber(lower) + ":");
        lines.push(a.text);
        lines.push("  Sub 2 - Handicap " + (upper >= 0 ? '+' : '') + formatNumber(upper) + ":");
        lines.push(b.text);
        lines.push("Rata-rata kedua sub -> factor " + formatNumber(factor) + " (" + statusLabelForFactorText(factor) + ")");
    } else {
        let a = evalHalf(line);
        factor = a.factor;
        lines.push("Handicap " + (line >= 0 ? '+' : '') + formatNumber(line) + " adalah garis penuh/setengah, dihitung langsung:");
        lines.push(a.text);
        lines.push("-> factor " + formatNumber(factor) + " (" + statusLabelForFactorText(factor) + ")");
    }
    return { factor: factor, reasoning: lines.join("\n") };
}

function statusLabelForFactorText(factor) {
    if (factor === 1) return 'MENANG PENUH';
    if (factor === 0.5) return 'MENANG SETENGAH';
    if (factor === 0) return 'PUSH';
    if (factor === -0.5) return 'KALAH SETENGAH';
    return 'KALAH PENUH';
}

function factorToResult(factor) {
    if (factor === 1) return 'win';
    if (factor === 0.5) return 'half-win';
    if (factor === 0) return 'push';
    if (factor === -0.5) return 'half-lose';
    return 'lose';
}

function determineLegResult(betInfo, homeGoals, awayGoals) {
    let market = betInfo.market, selection = betInfo.selection, line = betInfo.line;
    if (market === 'handicap') {
        if (!betInfo.side || line === null || isNaN(line)) return { result: 'unknown', factor: null, reasoning: null };
        let teamGoals = betInfo.side === 'home' ? homeGoals : awayGoals;
        let oppGoals = betInfo.side === 'home' ? awayGoals : homeGoals;
        let teamLabel = betInfo.side === 'home' ? betInfo.teamHome : betInfo.teamAway;
        let oppLabel = betInfo.side === 'home' ? betInfo.teamAway : betInfo.teamHome;
        let r = asianHandicapReasoning(line, teamGoals, oppGoals, teamLabel, oppLabel);
        return { result: factorToResult(r.factor), factor: r.factor, reasoning: r.reasoning };
    }
    if (market === '1x2') {
        if (selection === 'home') return { result: homeGoals > awayGoals ? 'win' : 'lose', factor: homeGoals > awayGoals ? 1 : -1, reasoning: "Pilihan Home Menang. Skor akhir " + homeGoals + " - " + awayGoals + " -> " + (homeGoals > awayGoals ? "Home benar menang." : "Home tidak menang.") };
        if (selection === 'away') return { result: awayGoals > homeGoals ? 'win' : 'lose', factor: awayGoals > homeGoals ? 1 : -1, reasoning: "Pilihan Away Menang. Skor akhir " + homeGoals + " - " + awayGoals + " -> " + (awayGoals > homeGoals ? "Away benar menang." : "Away tidak menang.") };
        if (selection === 'draw') return { result: homeGoals === awayGoals ? 'win' : 'lose', factor: homeGoals === awayGoals ? 1 : -1, reasoning: "Pilihan Seri (Draw). Skor akhir " + homeGoals + " - " + awayGoals + " -> " + (homeGoals === awayGoals ? "Benar seri." : "Tidak seri.") };
    }
    if (market === 'ou') {
        let total = homeGoals + awayGoals;
        if (selection === 'over') {
            let f = total > line ? 1 : (total === line ? 0 : -1);
            return { result: factorToResult(f), factor: f, reasoning: "Total gol " + total + " dibanding garis Over " + formatNumber(line) + " -> " + (f === 1 ? "MENANG (total lebih besar)" : f === 0 ? "PUSH (total sama persis)" : "KALAH (total lebih kecil/sama)") };
        }
        if (selection === 'under') {
            let f = total < line ? 1 : (total === line ? 0 : -1);
            return { result: factorToResult(f), factor: f, reasoning: "Total gol " + total + " dibanding garis Under " + formatNumber(line) + " -> " + (f === 1 ? "MENANG (total lebih kecil)" : f === 0 ? "PUSH (total sama persis)" : "KALAH (total lebih besar/sama)") };
        }
    }
    if (market === 'btts') {
        if (selection === 'both') { let f = (homeGoals > 0 && awayGoals > 0) ? 1 : -1; return { result: factorToResult(f), factor: f, reasoning: "Both Teams To Score - Ya. Skor " + homeGoals + "-" + awayGoals + " -> " + (f === 1 ? "kedua tim mencetak gol, MENANG." : "tidak keduanya mencetak gol, KALAH.") }; }
        if (selection === 'neither') { let f = (homeGoals === 0 && awayGoals === 0) ? 1 : -1; return { result: factorToResult(f), factor: f, reasoning: "Both Teams To Score - Tidak. Skor " + homeGoals + "-" + awayGoals + " -> " + (f === 1 ? "tidak ada tim mencetak gol, MENANG." : "ada tim yang mencetak gol, KALAH.") }; }
        if (selection === 'one') { let f = ((homeGoals > 0) !== (awayGoals > 0)) ? 1 : -1; return { result: factorToResult(f), factor: f, reasoning: "Both Teams To Score - Hanya Satu. Skor " + homeGoals + "-" + awayGoals + " -> " + (f === 1 ? "hanya satu tim mencetak gol, MENANG." : "KALAH.") }; }
    }
    return { result: 'unknown', factor: null, reasoning: null };
}

function describeMarket(betInfo) {
    switch (betInfo.market) {
        case 'handicap': {
            let sideLabel = betInfo.side === 'home' ? betInfo.teamHome :
                            betInfo.side === 'away' ? betInfo.teamAway :
                            '(tim tidak cocok dengan Home/Away, mohon cek manual: "' + betInfo.selection + '")';
            let lineLabel = (betInfo.line > 0 ? '+' : '') + formatNumber(betInfo.line);
            return 'Asian Handicap - Tim: ' + sideLabel + ' (' + lineLabel + ')';
        }
        case '1x2':
            return 'FT 1X2 - Pilihan: ' +
                (betInfo.selection === 'home' ? 'Home Menang' :
                 betInfo.selection === 'away' ? 'Away Menang' :
                 betInfo.selection === 'draw' ? 'Seri (Draw)' : 'tidak dikenali');
        case 'ou':
            return 'Over/Under - Pilihan: ' + (betInfo.selection === 'over' ? 'Over ' : 'Under ') + formatNumber(betInfo.line) + ' gol';
        case 'btts':
            return 'Both Teams To Score - Pilihan: ' +
                (betInfo.selection === 'both' ? 'Ya, kedua tim mencetak gol' :
                 betInfo.selection === 'neither' ? 'Tidak ada tim mencetak gol' :
                 betInfo.selection === 'one' ? 'Hanya satu tim mencetak gol' : 'tidak dikenali');
        default:
            return 'Pasaran tidak dikenali (' + betInfo.description + ')';
    }
}

function parseLeg(block) {
    let teamMatch = block.match(/^(.+?)\s+vs\.?\s+(.+)$/im);
    let betMatch = block.match(/bet:\s*(.+)/i);
    let ftMatch = block.match(/full\s*time\s*result:\s*(\d+)\s*:\s*(\d+)/i);
    if (!betMatch || !ftMatch) return null;

    let betInfo = parseBetLine(betMatch[1].trim());
    let homeGoals = parseInt(ftMatch[1], 10);
    let awayGoals = parseInt(ftMatch[2], 10);
    let teamHome = teamMatch ? teamMatch[1].trim() : '(tim home)';
    let teamAway = teamMatch ? teamMatch[2].trim() : '(tim away)';

    if (betInfo.market === 'handicap') {
        let sel = betInfo.selection;
        let homeLower = teamHome.toLowerCase();
        let awayLower = teamAway.toLowerCase();
        if (sel === 'home') betInfo.side = 'home';
        else if (sel === 'away') betInfo.side = 'away';
        else if (sel && (homeLower.includes(sel) || sel.includes(homeLower))) betInfo.side = 'home';
        else if (sel && (awayLower.includes(sel) || sel.includes(awayLower))) betInfo.side = 'away';
        else betInfo.side = null;
        betInfo.teamHome = teamHome;
        betInfo.teamAway = teamAway;
    }

    let resultInfo = determineLegResult(betInfo, homeGoals, awayGoals);

    return { teamHome: teamHome, teamAway: teamAway, betInfo: betInfo, homeGoals: homeGoals, awayGoals: awayGoals, result: resultInfo.result, factor: resultInfo.factor, reasoning: resultInfo.reasoning };
}

function parseBetSlip(text) {
    text = normalizeBetText(text);
    let blocks = text.split(/\n\s*\n+/).map(function(b) { return b.trim(); }).filter(Boolean);
    let legs = [];
    blocks.forEach(function(b) {
        let leg = parseLeg(b);
        if (leg) legs.push(leg);
    });
    return legs;
}

// ============================================================
// BAGIAN 2: DETEKSI SEDERHANA (fallback jika Details BUKAN slip
// multi-leg terstruktur, misalnya cuma catatan bebas)
// ============================================================
function containsWord(text, words) {
    return words.some(function(w) {
        let re = new RegExp('\\b' + w + '\\b', 'i');
        return re.test(text);
    });
}

function detectStatusFromKeywords(details) {
    let winWords = ["won", "win", "menang", "unggul"];
    let loseWords = ["lose", "lost", "kalah"];
    let isWin = containsWord(details, winWords);
    let isLose = containsWord(details, loseWords);

    if (isWin && !isLose) {
        return { status: "won", note: "Status MENANG terdeteksi dari kata kunci kemenangan pada Details (mode teks bebas, bukan slip terstruktur)." };
    } else if (isLose && !isWin) {
        return { status: "lose", note: "Status KALAH terdeteksi dari kata kunci kekalahan pada Details (mode teks bebas, bukan slip terstruktur)." };
    } else if (isWin && isLose) {
        return { status: "lose", note: "Details mengandung kata kunci menang dan kalah sekaligus (ambigu). Status di-default-kan ke KALAH untuk keamanan. Mohon periksa detail." };
    } else {
        return { status: "lose", note: "Tidak ditemukan kata kunci menang/kalah yang jelas dan tidak terdeteksi format slip terstruktur (Bet: ... / Full time result: ...). Status di-default-kan ke KALAH." };
    }
}

// ============================================================
// BAGIAN 3: PERHITUNGAN PEMBAYARAN (Decimal / American, auto-detect)
// ============================================================
// factor: 1 = menang penuh, 0.5 = menang setengah, 0 = push (stake kembali),
// -0.5 = kalah setengah, -1 = kalah penuh. Ini adalah standar settlement
// Asian Handicap/garis quarter, dan juga berlaku untuk hasil biner (1x2, O/U, dst).
function calcPayout(stake, odds, factor) {
    let winLose = 0, totalKemenangan = 0, explanationText = "";
    let isAmerican = Math.abs(odds) >= 100;
    let fullWinProfitPerUnit; // profit per 1 unit stake jika MENANG PENUH

    if (isAmerican) {
        fullWinProfitPerUnit = odds > 0 ? (odds / 100) : (100 / Math.abs(odds));
        explanationText += "Odds " + (odds > 0 ? '+' : '') + formatNumber(odds) + " terdeteksi sebagai American.\n" +
            "Keuntungan penuh per unit stake = " + formatNumber(fullWinProfitPerUnit) + "\n";
    } else {
        fullWinProfitPerUnit = odds - 1;
        explanationText += "Odds " + formatNumber(odds) + " terdeteksi sebagai Decimal.\n" +
            "Keuntungan penuh per unit stake = Odds - 1 = " + formatNumber(fullWinProfitPerUnit) + "\n";
    }

    winLose = factor >= 0 ? stake * factor * fullWinProfitPerUnit : stake * factor;
    totalKemenangan = stake + winLose;

    if (factor === 1) {
        explanationText += "Status: MENANG PENUH.\n" +
            "Keuntungan = Stake x " + formatNumber(fullWinProfitPerUnit) + " = " + formatNumber(stake) + " x " + formatNumber(fullWinProfitPerUnit) + " = " + formatNumber(winLose) + "\n" +
            "Total Kemenangan = Stake + Keuntungan = " + formatNumber(totalKemenangan);
    } else if (factor === 0.5) {
        explanationText += "Status: MENANG SETENGAH (Half Win).\n" +
            "Setengah stake menang di odds, setengah lainnya push (kembali).\n" +
            "Keuntungan = Stake x 0.5 x " + formatNumber(fullWinProfitPerUnit) + " = " + formatNumber(winLose) + "\n" +
            "Total Kemenangan = Stake + Keuntungan = " + formatNumber(totalKemenangan);
    } else if (factor === 0) {
        explanationText += "Status: PUSH / SERI.\n" +
            "Seluruh Stake dikembalikan, tidak untung maupun rugi.\n" +
            "Total Kemenangan = Stake = " + formatNumber(totalKemenangan);
    } else if (factor === -0.5) {
        explanationText += "Status: KALAH SETENGAH (Half Lose).\n" +
            "Setengah stake hilang, setengah lainnya dikembalikan.\n" +
            "Kerugian = -Stake x 0.5 = " + formatNumber(winLose) + "\n" +
            "Total Kemenangan = " + formatNumber(totalKemenangan);
    } else {
        explanationText += "Status: KALAH PENUH.\n" +
            "Seluruh Stake hilang.\n" +
            "Win/Lose = -Stake = " + formatNumber(winLose) + "\n" +
            "Total Kemenangan = 0";
    }

    return { winLose: winLose, totalKemenangan: totalKemenangan, explanationText: explanationText };
}

// ============================================================
// BAGIAN 4: HANDLER UTAMA
// ============================================================
function statusLabel(factor) {
    if (factor === 1) return 'MENANG';
    if (factor === 0.5) return 'MENANG SETENGAH';
    if (factor === 0) return 'PUSH / SERI';
    if (factor === -0.5) return 'KALAH SETENGAH';
    if (factor === -1) return 'KALAH';
    return 'PERLU CEK MANUAL';
}

function statusClass(factor) {
    if (factor === null) return 'neutral';
    if (factor > 0) return 'win';
    if (factor < 0) return 'lose';
    return 'neutral';
}

function hitungBetting(event) {
    event.preventDefault();

    let details = document.getElementById('details').value;
    let stake = parseFloat(document.getElementById('stake').value);
    let odds = parseFloat(document.getElementById('odds').value);

    if (isNaN(stake) || stake <= 0) {
        alert("Stake harus berupa angka lebih besar dari 0.");
        return;
    }
    if (isNaN(odds) || odds === 0) {
        alert("Odds harus diisi dengan angka dan tidak boleh 0.");
        return;
    }
    if (odds > 0 && odds < 100 && odds <= 1) {
        alert("Odds decimal harus lebih besar dari 1 (contoh: 1.85). Jika ini odds American, gunakan nilai >= 100 atau <= -100.");
        return;
    }

    let factor = -1; // default aman jika tidak ada slip terstruktur maupun kata kunci jelas
    let explanationText = "";

    // --- Coba parsing sebagai slip multi-leg (parlay) terlebih dahulu ---
    let legs = parseBetSlip(details);

    if (legs.length > 0) {
        let isSingle = legs.length === 1;

        explanationText += isSingle
            ? "Terdeteksi taruhan SINGLE (1 pertandingan):\n\n"
            : "Terdeteksi " + legs.length + " leg pertandingan (parlay/mix parlay):\n\n";

        legs.forEach(function(l, i) {
            explanationText += (isSingle ? "" : (i + 1) + ". ") + l.teamHome + " vs " + l.teamAway + "\n";
            explanationText += "   Pasaran   : " + describeMarket(l.betInfo) + " @" + formatNumber(l.betInfo.odds) + "\n";
            explanationText += "   Skor FT   : " + l.homeGoals + " - " + l.awayGoals + "\n";
            explanationText += "   Hasil     : " + statusLabel(l.factor === undefined ? null : l.factor) + "\n";
            if (l.reasoning) {
                explanationText += "   Alasan    :\n" + l.reasoning.split("\n").map(function(s) { return "   " + s; }).join("\n") + "\n";
            }
            explanationText += "\n";
        });

        let anyUnknown = legs.some(function(l) { return l.result === 'unknown'; });
        let anyFullLose = legs.some(function(l) { return l.factor === -1; });

        if (anyUnknown) {
            explanationText += "PERHATIAN: ada " + (isSingle ? "pasaran" : "leg dengan jenis pasaran") + " yang belum dikenali sistem (selain Asian Handicap / FT 1X2 / Over-Under / Both Teams To Score). Mohon verifikasi manual sebelum mempercayai status akhir.\n\n";
        }

        if (anyUnknown) {
            // Tidak menebak menang/kalah untuk pasaran yang tidak dikenali — lebih aman
            // menandai "perlu cek manual" daripada salah men-declare KALAH.
            factor = null;
        } else if (isSingle) {
            // Single bet: hasil akhir mengikuti factor pertandingan itu langsung,
            // termasuk kasus half-win / push / half-lose (mis. garis quarter -0.75).
            factor = legs[0].factor;
        } else {
            // Parlay/mix parlay: satu leg kalah penuh/setengah membuat seluruh
            // taruhan gabungan bust. Half-win dihitung sebagai leg yang tetap lolos.
            factor = anyFullLose || legs.some(function(l) { return l.factor === -0.5; }) ? -1 : 1;
        }

        let computedCombinedOdds = legs.reduce(function(acc, l) {
            return l.factor === 0 ? acc : acc * l.betInfo.odds;
        }, 1);

        if (isSingle) {
            explanationText += "Karena ini taruhan SINGLE (hanya 1 pertandingan), status taruhan langsung mengikuti hasil pertandingan tersebut.\n";
            explanationText += "Odds pertandingan (cross-check) = " + formatNumber(computedCombinedOdds) + "\n";
            explanationText += "Odds yang Anda masukkan di form = " + formatNumber(odds) + "\n";
            if (Math.abs(computedCombinedOdds - odds) > Math.max(0.01, computedCombinedOdds * 0.02)) {
                explanationText += "Catatan: ada selisih antara odds hasil parsing dan odds yang Anda masukkan, mohon cek ulang.\n";
            }
            explanationText += "\nStatus: " + statusLabel(factor) + "\n\n";
        } else {
            explanationText += "Karena ini taruhan gabungan (parlay/mix parlay), SEMUA leg harus MENANG (penuh atau setengah) agar keseluruhan taruhan menang.\n";
            explanationText += "Odds gabungan hasil kali tiap leg (cross-check) = " + formatNumber(computedCombinedOdds) + "\n";
            explanationText += "Odds yang Anda masukkan di form           = " + formatNumber(odds) + "\n";
            if (Math.abs(computedCombinedOdds - odds) > Math.max(0.01, computedCombinedOdds * 0.02)) {
                explanationText += "Catatan: ada selisih antara odds gabungan hasil parsing dan odds yang Anda masukkan, mohon cek ulang.\n";
            }
            explanationText += "\nStatus keseluruhan: " + statusLabel(factor) + "\n\n";
        }

    } else {
        let detected = detectStatusFromKeywords(details);
        factor = detected.status === 'won' ? 1 : -1;
        explanationText += detected.note + "\n\n";
    }

    // --- Hitung pembayaran berdasarkan factor & odds yang dimasukkan di form ---
    // Jika benar-benar tidak dikenali (factor null), jangan menebak untung/rugi:
    // perlakukan sebagai push (stake kembali) sambil tetap menandai perlu cek manual,
    // supaya sistem tidak salah mengklaim KALAH pada taruhan yang sebenarnya menang.
    let payoutFactor = factor === null ? 0 : factor;
    let payout = calcPayout(stake, odds, payoutFactor);
    explanationText += payout.explanationText;

    // Menampilkan hasil ke dalam tabel & kotak penjelasan
    document.getElementById('res-details').textContent = details;
    document.getElementById('res-total-kemenangan').textContent = formatNumber(payout.totalKemenangan);
    document.getElementById('res-actual-stake').textContent = formatNumber(stake);
    document.getElementById('res-stake').textContent = formatNumber(stake);
    document.getElementById('res-odds').textContent = (odds > 0 ? '+' : '') + formatNumber(odds);

    let statusElem = document.getElementById('res-status');
    statusElem.textContent = statusLabel(factor);
    statusElem.className = statusClass(factor);

    let winLoseElem = document.getElementById('res-win-lose');
    let formattedWinLose = (payout.winLose > 0 ? '+' : '') + formatNumber(payout.winLose);
    winLoseElem.textContent = formattedWinLose;
    winLoseElem.className = payout.winLose > 0 ? 'win' : (payout.winLose < 0 ? 'lose' : 'neutral');

    const resExplanationEl = document.getElementById('res-explanation');
    resExplanationEl.value = explanationText;

    document.getElementById('result-section').style.display = 'block';
    autoGrowTextarea(resExplanationEl, 260);
}
</script>
