<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Kalkulator Betting Otomatis dengan Gemini AI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg-deep: #0a0d1a;
  --bg-mid: #12162a;
  --surface: #161b31;
  --surface-alt: #1c2138;
  --border: rgba(255,255,255,0.08);
  --border-soft: rgba(255,255,255,0.05);
  --text-primary: #f5f3f8;
  --text-muted: #9297b3;
  --win: #3ce6a0;
  --lose: #fb7189;
  --shadow: 0 20px 60px rgba(0,0,0,0.45);
  --gold-light: #f6e7a8;
  --gold: #d9b45a;
  --gold-deep: #a7782c;
  --gold-dim: rgba(217,180,90,0.15);
  --gold-gradient: linear-gradient(120deg, var(--gold-light) 0%, var(--gold) 45%, var(--gold-deep) 100%);
}

* { box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(1200px 600px at 15% -10%, #1b1440 0%, transparent 60%),
              radial-gradient(1000px 500px at 110% 10%, #101c3a 0%, transparent 55%),
              linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 100%);
  background-attachment: fixed;
  margin: 0;
  padding: 40px 20px;
  color: var(--text-primary);
  min-height: 100vh;
}

.container {
  max-width: 1100px;
  margin: auto;
  background: linear-gradient(180deg, var(--surface) 0%, var(--bg-mid) 100%);
  padding: 36px 40px 44px;
  border-radius: 18px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.container::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--gold-gradient);
  box-shadow: 0 0 14px rgba(217,180,90,0.5);
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold-light);
  background: rgba(217,180,90,0.08);
  border: 1px solid rgba(217,180,90,0.35);
  padding: 5px 12px;
  border-radius: 999px;
  margin-bottom: 18px;
}
.eyebrow::before {
  content: "";
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold);
}

h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: clamp(22px, 2.4vw, 30px);
  background: var(--gold-gradient);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin: 0 0 28px;
}

h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 18px;
  background: var(--gold-gradient);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin: 0 0 16px;
}

.form-group { margin-bottom: 20px; }

label {
  display: block;
  margin-bottom: 8px;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.02em;
  color: var(--gold-light);
}

input[type="number"], input[type="password"], textarea {
  width: 100%;
  padding: 12px 14px;
  box-sizing: border-box;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: rgba(255,255,255,0.03);
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}

input:focus, textarea:focus {
  outline: none;
  border-color: var(--gold);
  background: rgba(217,180,90,0.06);
  box-shadow: 0 0 0 3px var(--gold-dim);
}

textarea { height: 120px; resize: vertical; }

button {
  background: var(--gold-gradient);
  color: #1c1608;
  border: none;
  padding: 13px 26px;
  cursor: pointer;
  border-radius: 10px;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 14px;
  box-shadow: 0 8px 24px rgba(217,180,90,0.25);
  transition: transform 0.12s ease, filter 0.12s ease;
}
button:hover { filter: brightness(1.08); transform: translateY(-1px); }

.btn-gemini {
  background: linear-gradient(120deg, #818cf8 0%, #6366f1 100%);
  color: #fff;
  margin-top: 10px;
  box-shadow: 0 8px 24px rgba(99,102,241,0.3);
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin-top: 20px;
  overflow-x: auto;
  display: block;
  border-radius: 12px;
  border: 1px solid var(--border);
}

th, td {
  border-bottom: 1px solid var(--border-soft);
  padding: 14px 16px;
  text-align: left;
  font-size: 13px;
  white-space: nowrap;
}

th {
  background: var(--surface-alt);
  color: var(--gold-light);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
}

td { background: rgba(255,255,255,0.015); color: var(--text-primary); }

.win { color: var(--win); font-weight: 700; }
.lose { color: var(--lose); font-weight: 700; }

#result-section { display: none; margin-top: 34px; }

.explanation-box textarea {
  background: #0d1022;
  color: #c9cee8;
  height: 200px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
}

.gemini-box textarea {
  background: #10132b;
  color: #a5b4fc;
  height: 220px;
  font-family: 'Inter', sans-serif;
  border-color: rgba(99,102,241,0.3);
}
</style>
</head>
<body>

<div class="container">
<span class="eyebrow">SMB Group · Betting Engine + Gemini AI</span>
<h2>Dashboard Kalkulator & Analisis AI</h2>

<!-- Form Input -->
<form id="betForm" onsubmit="hitungBetting(event)">
<div class="form-group">
<label>Gemini API Key:</label>
<input type="password" id="apiKey" placeholder="Masukkan Gemini API Key Anda di sini...">
</div>

<div class="form-group">
<label>Details Pertandingan:</label>
<textarea id="details" required placeholder="Masukkan detail taruhan di sini..."></textarea>
</div>

<div class="form-group">
<label>Stake:</label>
<input type="number" step="any" id="stake" required placeholder="Contoh: 100">
</div>

<div class="form-group">
<label>Odds:</label>
<input type="number" step="any" id="odds" required placeholder="Contoh: 1.85">
</div>

<button type="submit">Proses & Hitung</button>
</form>

<!-- Tabel Hasil Output -->
<div id="result-section">
<h3>Hasil Kalkulasi Dashboard:</h3>
<table>
<thead>
<tr>
<th>Details</th>
<th>Total Kemenangan</th>
<th>Actual Stake</th>
<th>Stake</th>
<th>Win & Lose</th>
<th>Odds</th>
<th>Ip</th>
<th>Status</th>
</tr>
</thead>
<tbody>
<tr>
<td><pre id="res-details" style="margin:0; font-family:inherit; white-space: pre-wrap;"></pre></td>
<td id="res-total-kemenangan"></td>
<td id="res-actual-stake"></td>
<td id="res-stake"></td>
<td id="res-win-lose"></td>
<td id="res-odds"></td>
<td>-</td>
<td id="res-status"></td>
</tr>
</tbody>
</table>

<!-- Kotak Penjelasan Kalkulasi -->
<div class="form-group" style="margin-top: 20px;">
<label for="res-explanation">Penjelasan Sistem:</label>
<textarea id="res-explanation" readonly></textarea>
</div>

<!-- Kotak Analisis Gemini AI -->
<div class="form-group explanation-box gemini-box">
<label for="gemini-output">Analisis Tambahan dari Gemini AI:</label>
<textarea id="gemini-output" readonly placeholder="Klik tombol di bawah untuk meminta analisis mendalam dari Gemini AI..."></textarea>
<button type="button" class="btn-gemini" onclick="tanyaGeminiAI()">✨ Analisis dengan Gemini AI</button>
</div>
</div>

</div>

<!-- Menggunakan SDK Google Gen AI untuk Browser -->
<script type="importmap">
  {
    "imports": {
      "@google/genai": "https://esm.run/@google/genai"
    }
  }
</script>

<script>
let globalCalculationData = {};

function formatNumber(num) {
    return Number(num).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function parseBetDescription(desc) {
    desc = desc.toLowerCase();
    if (desc.includes('1x2')) {
        let selection = null;
        if (/\bhome\b/.test(desc)) selection = 'home';
        else if (/\baway\b/.test(desc)) selection = 'away';
        else if (/\bdraw\b/.test(desc)) selection = 'draw';
        return { market: '1x2', selection: selection };
    }
    if (desc.includes('over') || desc.includes('under')) {
        let selection = desc.includes('over') ? 'over' : 'under';
        return { market: 'ou', selection: selection };
    }
    if (desc.includes('both teams to score') || desc.includes('btts')) {
        return { market: 'btts', selection: 'both' };
    }
    if (desc.includes('neither')) {
        return { market: 'btts', selection: 'neither' };
    }
    if (/\bone team\b/.test(desc)) {
        return { market: 'btts', selection: 'one' };
    }
    return { market: 'unknown', selection: null };
}

function parseBetLine(betLineRaw) {
    let oddsMatch = betLineRaw.match(/@\s*([\d.]+)\s*$/);
    let odds = oddsMatch ? parseFloat(oddsMatch[1]) : NaN;
    let withoutOdds = betLineRaw.replace(/@\s*[\d.]+\s*$/, '').trim();
    let lineMatch = withoutOdds.match(/([\d.]+)\s*$/);
    let line = lineMatch ? parseFloat(lineMatch[1]) : null;
    let withoutLine = lineMatch ? withoutOdds.slice(0, lineMatch.index).trim() : withoutOdds;
    let parsed = parseBetDescription(withoutLine);
    return { odds: odds, line: line, market: parsed.market, selection: parsed.selection, description: withoutLine };
}

function determineLegResult(betInfo, homeGoals, awayGoals) {
    let market = betInfo.market, selection = betInfo.selection, line = betInfo.line;
    if (market === '1x2') {
        if (selection === 'home') return homeGoals > awayGoals ? 'win' : 'lose';
        if (selection === 'away') return awayGoals > homeGoals ? 'win' : 'lose';
        if (selection === 'draw') return homeGoals === awayGoals ? 'win' : 'lose';
    }
    if (market === 'ou') {
        let total = homeGoals + awayGoals;
        if (selection === 'over') return total > line ? 'win' : (total === line ? 'push' : 'lose');
        if (selection === 'under') return total < line ? 'win' : (total === line ? 'push' : 'lose');
    }
    if (market === 'btts') {
        if (selection === 'both') return (homeGoals > 0 && awayGoals > 0) ? 'win' : 'lose';
        if (selection === 'neither') return (homeGoals === 0 && awayGoals === 0) ? 'win' : 'lose';
        if (selection === 'one') return ((homeGoals > 0) !== (awayGoals > 0)) ? 'win' : 'lose';
    }
    return 'unknown';
}

function parseLeg(block) {
    let teamMatch = block.match(/^(.+?)\s+vs\.?\s+(.+)$/im);
    let betMatch = block.match(/bet:\s*(.+)/i);
    let ftMatch = block.match(/full\s*time\s*result:\s*(\d+)\s*:\s*(\d+)/i);
    if (!betMatch || !ftMatch) return null;

    let betInfo = parseBetLine(betMatch[1].trim());
    let homeGoals = parseInt(ftMatch[1], 10);
    let awayGoals = parseInt(ftMatch[2], 10);
    let teamHome = teamMatch ? teamMatch[1].trim() : '(tim home)';
    let teamAway = teamMatch ? teamMatch[2].trim() : '(tim away)';
    let result = determineLegResult(betInfo, homeGoals, awayGoals);

    return { teamHome: teamHome, teamAway: teamAway, betInfo: betInfo, homeGoals: homeGoals, awayGoals: awayGoals, result: result };
}

function parseBetSlip(text) {
    let blocks = text.split(/\n\s*\n+/).map(function(b) { return b.trim(); }).filter(Boolean);
    let legs = [];
    blocks.forEach(function(b) {
        let leg = parseLeg(b);
        if (leg) legs.push(leg);
    });
    return legs;
}

function calcPayout(stake, odds, status) {
    let winLose = 0, totalKemenangan = 0, explanationText = "";
    if (status === 'won') {
        winLose = stake * (odds - 1);
        totalKemenangan = stake * odds;
        explanationText = "Odds Decimal terdeteksi. Total Kemenangan = Stake x Odds (" + formatNumber(stake) + " x " + formatNumber(odds) + " = " + formatNumber(totalKemenangan) + ").";
    } else {
        winLose = -stake;
        totalKemenangan = 0;
        explanationText = "Taruhan kalah, seluruh Stake senilai -" + formatNumber(stake) + " hilang.";
    }
    return { winLose: winLose, totalKemenangan: totalKemenangan, explanationText: explanationText };
}

function hitungBetting(event) {
    event.preventDefault();

    let details = document.getElementById('details').value;
    let stake = parseFloat(document.getElementById('stake').value);
    let odds = parseFloat(document.getElementById('odds').value);

    let status = "lose";
    let explanationText = "";
    let legs = parseBetSlip(details);

    if (legs.length > 0) {
        let anyLose = legs.some(function(l) { return l.result === 'lose'; });
        let anyUnknown = legs.some(function(l) { return l.result === 'unknown'; });
        status = (anyLose || anyUnknown) ? "lose" : "won";
        explanationText += "Berhasil memparsing " + legs.length + " leg pertandingan.\n";
    } else {
        explanationText += "Mode teks bebas digunakan.\n";
        if (details.toLowerCase().includes('win') || details.toLowerCase().includes('menang')) {
            status = 'won';
        }
    }

    let payout = calcPayout(stake, odds, status);
    explanationText += "\n" + payout.explanationText;

    // Simpan data global untuk dikirim ke Gemini
    globalCalculationData = { details, stake, odds, status, totalKemenangan: payout.totalKemenangan, winLose: payout.winLose };

    // Tampilkan ke UI
    document.getElementById('res-details').textContent = details;
    document.getElementById('res-total-kemenangan').textContent = formatNumber(payout.totalKemenangan);
    document.getElementById('res-actual-stake').textContent = formatNumber(stake);
    document.getElementById('res-stake').textContent = formatNumber(stake);
    document.getElementById('res-odds').textContent = formatNumber(odds);

    let statusElem = document.getElementById('res-status');
    statusElem.textContent = status.toUpperCase();
    statusElem.className = status === 'won' ? 'win' : 'lose';

    let winLoseElem = document.getElementById('res-win-lose');
    winLoseElem.textContent = (payout.winLose > 0 ? '+' : '') + formatNumber(payout.winLose);
    winLoseElem.className = payout.winLose >= 0 ? 'win' : 'lose';

    document.getElementById('res-explanation').value = explanationText;
    document.getElementById('gemini-output').value = ""; // Reset box gemini
    document.getElementById('result-section').style.display = 'block';
}

// Fungsi Integrasi Gemini AI
async function tanyaGeminiAI() {
    let apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) {
        alert("Mohon masukkan Gemini API Key terlebih dahulu di kolom atas!");
        return;
    }

    let geminiOutputBox = document.getElementById('gemini-output');
    geminiOutputBox.value = "Sedang meminta analisis dari Gemini AI...";

    try {
        // Menggunakan SDK Resmi Google Gen AI (@google/genai)
        const { GoogleGenAI } = await import("@google/genai");
        const ai = new GoogleGenAI({ apiKey: apiKey });

        let prompt = `Berikan analisis profesional dan ringkas mengenai slip taruhan berikut dalam bahasa Indonesia:
- Detail Pertandingan: ${globalCalculationData.details}
- Stake: ${globalCalculationData.stake}
- Odds: ${globalCalculationData.odds}
- Status Akhir: ${globalCalculationData.status.toUpperCase()}
- Total Kemenangan/Kerugian: ${globalCalculationData.winLose}

Berikan evaluasi performa taruhan ini dan catatan manajemen risiko yang baik.`;

        const response = await ai.models.generateContent({
            model: 'gemini-2.5-flash',
            contents: prompt,
        });

        geminiOutputBox.value = response.text;
    } catch (error) {
        console.error(error);
        geminiOutputBox.value = "Terjadi kesalahan saat memanggil Gemini API: " + error.message;
    }
}
</script>

</body>
</html>
